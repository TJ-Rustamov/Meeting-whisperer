# Meeting Whisperer Application Configuration
# This file allows customization of the application behavior
# Place in user AppData directory or use environment variables

# NOTE: Environment variables override these settings

[Application]
# Application name shown in UI and system
app_name = Meeting Whisperer

# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

[Backend]
# Server configuration
host = 127.0.0.1
port = 8000

# Database settings
# Default: SQLite in AppData
# database_url = sqlite:///./meetings.db
# For production, use PostgreSQL:
# database_url = postgresql://user:password@localhost/meetings

# Data storage
# Logs will be stored here
data_dir = ./data
audio_dir = ./data/audio

[Transcription]
# Whisper model: tiny.en, base.en, small.en, medium.en, large
model = base.en
language = en

# Device: cpu or cuda (GPU)
device = cpu

# Compute type: int8 (fast), float16 (medium), float32 (accurate)
compute_type = int8

# Decoding options
beam_size = 5
best_of = 5
patience = 1.0
temperature = 0.0
no_speech_threshold = 0.6
log_prob_threshold = -1.0

[Voice Activity Detection]
# Silero VAD threshold (0.0-1.0)
# Lower = more sensitive to speech
silero_threshold = 0.35

# VAD frame settings
hangover_frames = 8
min_rms_floor = 80
quiet_multiplier = 0.65

# Audio parameters
sample_rate = 16000

[PostProcessing]
# Speaker diarization (requires HuggingFace token)
use_pyannote = false
pyannote_model = pyannote/speaker-diarization-3.1
hf_token = 

# Diarization timeout in seconds
diarization_timeout_sec = 600

# Fallback to simple diarization if pyannote fails
allow_simple_fallback = true

# Force number of speakers (0 = auto):
force_num_speakers = 0

[Frontend]
# Server configuration
frontend_port = 5173
open_browser = true

# API base URL (set automatically, override if needed)
# api_base_url = http://localhost:8000

[Performance]
# Partial transcription interval (seconds)
partial_interval_sec = 1.2

# Silence finalization time (seconds)
silence_finalize_sec = 1.0

# Live transcription overlap (seconds)
live_overlap_sec = 0.35

# Maximum audio for partial transcription (seconds)
partial_max_audio_sec = 10.0

# Minimum new audio for update (seconds)
partial_min_new_audio_sec = 0.6

[Security]
# CORS origins (comma-separated)
# Default allows localhost only
cors_origins = http://localhost:5173,http://127.0.0.1:5173

# Session timeout (minutes)
session_timeout = 30

# Max upload size (MB)
max_upload_size = 100

[Debug]
# Enable debug logging
debug = false

# Fake model for testing (doesn't require ML libraries)
fake_model = false

# Enable API documentation at /docs
enable_docs = true
